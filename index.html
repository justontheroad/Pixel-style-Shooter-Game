<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>像素射击 - Pixel Shooter</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="gameContainer">
    <div id="hud" class="hidden">
      <div id="hud-top">
        <span id="score">0</span>
        <span id="combo"></span>
      </div>
      <div id="hud-middle">
        <span id="weapon">左轮手枪</span>
        <span id="wave"></span>
        <span id="stage">新手期</span>
      </div>
      <div id="powerup-status"></div>
      <div id="hud-bottom">
        <span id="time">0.0s</span>
      </div>
    </div>

    <div id="start-overlay">
      <div id="start-content">
        <h1>像素射击</h1>
        <p class="subtitle">PIXEL SHOOTER</p>
        <div id="how-to-play">
          <div class="instruction">
            <span class="key">🖱️ 点击</span>
            <span class="desc">切换通道</span>
          </div>
          <div class="instruction">
            <span class="key">⬅ ➡</span>
            <span class="desc">键盘切换</span>
          </div>
          <div class="instruction">
            <span class="key">🔫 拾取</span>
            <span class="desc">升级武器</span>
          </div>
          <div class="instruction">
            <span class="key">🛡 道具</span>
            <span class="desc">护盾/减速/双倍/清除/临时武器/分身</span>
          </div>
        </div>
        <button id="startBtn" class="game-btn">START</button>
      </div>
    </div>

    <div id="gameover-overlay" class="hidden">
      <div id="gameover-content">
        <h2>GAME OVER</h2>
        <div id="new-record" class="hidden">NEW RECORD!</div>
        <div class="stats">
          <div class="stat-row"><span>SCORE</span><span id="final-score">0</span></div>
          <div class="stat-row"><span>TIME</span><span id="final-time">0s</span></div>
          <div class="stat-row"><span>DESTROYED</span><span id="final-destroyed">0</span></div>
          <div class="stat-row"><span>MAX COMBO</span><span id="final-combo">0</span></div>
          <div class="stat-row"><span>HIGH SCORE</span><span id="high-score">0</span></div>
          <div class="stat-row weapons-row"><span>WEAPONS</span><span id="weapons-list"></span></div>
        </div>
        <div class="gameover-buttons">
          <button id="restartBtn" class="game-btn btn-restart">RESTART</button>
          <button id="continueBtn" class="game-btn btn-continue">
            <span class="btn-label">CONTINUE</span>
            <span class="btn-ad-hint">📺 观看广告</span>
          </button>
        </div>
      </div>
    </div>

    <button id="muteBtn" class="mute-btn">🔊</button>

    <div id="ad-overlay" class="hidden">
      <div id="ad-content">
        <div id="ad-placeholder">📢 广告位</div>
        <div id="ad-countdown-text">广告加载中 <span id="ad-countdown">3</span>s</div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
